supported_languages:
  - en
default_score_threshold: 0
nlp_configuration:
  nlp_engine_name: slim
  models:
    - lang_code: en
      model_name: en_core_web_sm

recognizer_registry:
  # global_regex_flags: 26
  recognizers:
    # GLiNERRecognizer replaces SpacyRecognizer for NER-based entity detection.
    # The slim NLP engine provides only tokenization and lemmatization;
    # entity extraction is handled by self-contained recognizers like GLiNER.
    - name: GLiNERRecognizer
      type: predefined
      enabled: true

    - name: CreditCardRecognizer
      supported_languages:
      - language: en
        context: [credit, card, visa, mastercard, cc, amex, discover, jcb, diners, maestro, instapayment]
      type: predefined

    - name: UsBankRecognizer
      type: predefined

    - name: UsLicenseRecognizer
      type: predefined

    - name: UsItinRecognizer
      type: predefined

    - name: UsPassportRecognizer
      type: predefined

    - name: UsSsnRecognizer
      type: predefined

    - name: NhsRecognizer
      type: predefined

    - name: UkNinoRecognizer
      type: predefined
      enabled: false

    - name: UkPassportRecognizer
      type: predefined
      enabled: false

    - name: SgFinRecognizer
      type: predefined
      enabled: false

    - name: AuAbnRecognizer
      type: predefined
      enabled: false

    - name: AuAcnRecognizer
      type: predefined
      enabled: false

    - name: AuTfnRecognizer
      type: predefined
      enabled: false

    - name: AuMedicareRecognizer
      type: predefined
      enabled: false

    - name: InPanRecognizer
      type: predefined
      enabled: false

    - name: InAadhaarRecognizer
      supported_languages:
      - en
      type: predefined
      enabled: false

    - name: InVehicleRegistrationRecognizer
      type: predefined
      enabled: false

    - name: InPassportRecognizer
      type: predefined
      enabled: false

    - name: CryptoRecognizer
      type: predefined

    - name: DateRecognizer
      type: predefined

    - name: EmailRecognizer
      type: predefined

    - name: IbanRecognizer
      type: predefined

    - name: IpRecognizer
      type: predefined

    - name: MedicalLicenseRecognizer
      type: predefined

    - name: PhoneRecognizer
      type: predefined

    - name: UrlRecognizer
      type: predefined

    - name: InVoterRecognizer
      type: predefined
      enabled: false

    - name: InGstinRecognizer
      type: predefined
      enabled: false
