# -----------------------------
# Lithuanian custom recognizers
# -----------------------------

  - name: LtPersonalCodeRecognizer
    type: custom
    supported_languages:
      - lt
    supported_entity: LT_PERSONAL_CODE
    patterns:
      - name: lt_personal_code_strict
        regex: \b[1-6]\d{2}(0[1-9]|1[0-2])(0[1-9]|[12]\d|3[01])\d{4}\b
        score: 0.95
    context:
      - asmens
      - kodas
      - a.k.
      - ak

  - name: LtPhoneRecognizer
    type: custom
    supported_languages:
      - lt
    supported_entity: PHONE_NUMBER
    patterns:
      - name: lt_mobile_phone
        regex: \b(?:\+370|8)[\s-]?6(?:[\s-]?\d){7}\b
        score: 0.9
    context:
      - telefonas
      - tel
      - telefono
      - numeris
      - mob
      - mobilus

  - name: LtIbanRecognizer
    type: custom
    supported_languages:
      - lt
    supported_entity: IBAN_CODE
    patterns:
      - name: lt_iban
        regex: \bLT\d{2}(?:\s?\d{4}){4}\b
        score: 0.95
    context:
      - iban
      - saskaita
      - sąskaita
      - banko
      - banko sąskaita
      - banko saskaita

  - name: LtPostalCodeRecognizer
    type: custom
    supported_languages:
      - lt
    supported_entity: LT_POSTAL_CODE
    patterns:
      - name: lt_postal_code
        regex: \bLT-\d{5}\b
        score: 0.85
    context:
      - pašto
      - adresas


  - name: LtDateRecognizer
    type: custom
    supported_languages:
      - lt
    supported_entity: DATE_TIME
    patterns:
      - name: lt_date_iso_multi_sep
        regex: \b(19|20)\d{2}[-./](0[1-9]|1[0-2])[-./](0[1-9]|[12]\d|3[01])\b
        score: 0.9
    context:
      - gimė
      - gime
      - gimiau
      - data
      - gimimo
      - gimimo data

  - name: LtOrganizationRecognizer
    type: custom
    supported_languages:
      - lt
    supported_entity: ORGANIZATION
    patterns:
      - name: lt_company_prefix_quoted_lt_quotes
        regex: '(?<!\w)(?:UAB|AB|MB|VŠĮ|VSI|IĮ|II)\s+„[^“]+“'
        score: 0.9
      - name: lt_company_prefix_quoted_ascii
        regex: '(?<!\w)(?:UAB|AB|MB|VŠĮ|VSI|IĮ|II)\s+"[^"]+"'
        score: 0.9
    context:
      - įmonė
      - imone
      - bendrovė
      - bendrove
      - organizacija
      - pirkėjas
      - tiekėjas
      - registruota
      - registracijos
      - įmonės kodas
      - imones kodas
    
  - name: TransformersRecognizer
    supported_languages:
      - lt
    type: predefined
