# BEWARE! Syntax errors in this file will silently
#         make presidio fall back to spacy-only configuration
nlp_configuration:
  nlp_engine_name: transformers
  models:
    -
      lang_code: en
      model_name:
        spacy: en_core_web_sm
        transformers: StanfordAIMI/stanford-deidentifier-base

  ner_model_configuration:
    labels_to_ignore:
    - O
    aggregation_strategy: max # "simple", "first", "average", "max"
    stride: 16
    alignment_mode: expand # "strict", "contract", "expand"
    model_to_presidio_entity_mapping:
      PER: PERSON
      LOC: LOCATION
      ORG: ORGANIZATION
      AGE: AGE
      ID: ID
      EMAIL: EMAIL
      PATIENT: PERSON
      STAFF: PERSON
      HOSP: ORGANIZATION
      PATORG: ORGANIZATION
      DATE: DATE_TIME
      PHONE: PHONE_NUMBER
      HCW: PERSON
      HOSPITAL: LOCATION
      VENDOR: ORGANIZATION ## based on the specific model. (from model docs)

    low_confidence_score_multiplier: 0.4
    low_score_entity_names:
    - ID

recognizer_registry:
  supported_languages:
    - en
  global_regex_flags: 26

  recognizers:
    # Recognizers listed here can either be loaded from the recognizers defined in code (type: predefined),
    # or created based on the provided configuration (type: custom).
    # For predefined:
    # - If only a recognizer name is provided, a predefined recognizer with this name and default parameters will be loaded.
    # - If a parameter isn't provided, the default one would be loaded.
    # For custom:
    # - See an example configuration here: https://github.com/microsoft/presidio/blob/main/presidio-analyzer/presidio_analyzer/conf/example_recognizers.yaml
    # - Custom pattern recognizers with this configuration can be added to this file, with type: custom
    #  For recognizers supporting more than one language, an instance of the recognizer for each language will be created.
    # For example, see the CreditCardRecognizer definition below:
    - name: CreditCardRecognizer
      supported_languages:
      - language: en
        context: [credit, card, visa, mastercard, cc, amex, discover, jcb, diners, maestro, instapayment]
      - language: es
        context: [tarjeta, credito, visa, mastercard, cc, amex, discover, jcb, diners, maestro, instapayment]
      - language: it
      - language: pl
      type: predefined

    - name: UsBankRecognizer
      supported_languages:
      - en
      type: predefined

    # - name: UsLicenseRecognizer
    #   supported_languages:
    #   - en
    #   type: predefined

    - name: UsItinRecognizer
      supported_languages:
      - en
      type: predefined

    - name: UsPassportRecognizer
      supported_languages:
      - en
      type: predefined

    - name: UsSsnRecognizer
      supported_languages:
      - en
      type: predefined

    - name: NhsRecognizer
      supported_languages:
      - en
      type: predefined

    - name: UkNinoRecognizer
      supported_languages:
      - en
      type: predefined

    - name: SgFinRecognizer
      supported_languages:
      - en
      type: predefined

    - name: AuAbnRecognizer
      supported_languages:
      - en
      type: predefined

    - name: AuAcnRecognizer
      supported_languages:
      - en
      type: predefined

    - name: AuTfnRecognizer
      supported_languages:
      - en
      type: predefined

    - name: AuMedicareRecognizer
      supported_languages:
      - en
      type: predefined

    # - name: InPanRecognizer
    #   supported_languages:
    #   - en
    #   type: predefined

    - name: InAadhaarRecognizer
      supported_languages:
      - en
      type: predefined

    - name: InVehicleRegistrationRecognizer
      supported_languages:
      - en
      type: predefined

    - name: InPassportRecognizer
      supported_languages:
      - en
      type: predefined

    - name: EsNifRecognizer
      supported_languages:
      - es
      type: predefined

    - name: EsNieRecognizer
      supported_languages:
      - es
      type: predefined

    - name: ItDriverLicenseRecognizer
      supported_languages:
      - it
      type: predefined

    - name: ItFiscalCodeRecognizer
      supported_languages:
      - it
      type: predefined

    - name: ItVatCodeRecognizer
      supported_languages:
      - it
      type: predefined

    - name: ItIdentityCardRecognizer
      supported_languages:
      - it
      type: predefined

    - name: ItPassportRecognizer
      supported_languages:
      - it
      type: predefined

    - name: PlPeselRecognizer
      supported_languages:
      - pl
      type: predefined

    - name: CryptoRecognizer
      type: predefined

    - name: DateRecognizer
      type: predefined

    - name: EmailRecognizer
      type: predefined

    - name: IbanRecognizer
      type: predefined

    - name: IpRecognizer
      type: predefined

    - name: MedicalLicenseRecognizer
      type: predefined

    - name: PhoneRecognizer
      type: predefined

    - name: UrlRecognizer
      type: predefined

    - name: InVoterRecognizer
      type: predefined

    - name: "DateOfBirthRecognizer"
      type: custom
      supported_languages:
        - en
      patterns:
        - name: "DOB without slashes"
          regex: "(\\b(19|20)\\d{2}(0[1-9]|1[0-2])(0[1-9]|[12]\\d|3[01])\\b)"
          score: 0.8
      context:
        - DOB
      supported_entity: "DATE_TIME"
