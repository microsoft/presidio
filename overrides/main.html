{% block analytics %}
<!-- Cookie consent banner -->
<style>
    #cookie-consent-banner {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: var(--md-default-bg-color, #fff);
        border-top: 1px solid var(--md-default-fg-color--lightest, #e0e0e0);
        padding: 1rem 1.5rem;
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        z-index: 9999;
        box-shadow: 0 -2px 8px rgba(0,0,0,0.1);
        font-size: 0.82rem;
    }
    #cookie-consent-banner p {
        margin: 0;
        flex: 1 1 300px;
        color: var(--md-default-fg-color, #333);
    }
    #cookie-consent-banner a {
        color: var(--md-accent-fg-color, #448aff);
    }
    #cookie-consent-banner .consent-buttons {
        display: flex;
        gap: 0.5rem;
        flex-shrink: 0;
    }
    #cookie-consent-banner button {
        padding: 0.4rem 1.2rem;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 0.82rem;
        font-weight: 500;
    }
    #cookie-consent-accept {
        background: var(--md-primary-fg-color, #4051b5);
        color: var(--md-primary-bg-color, #fff);
    }
    #cookie-consent-decline {
        background: var(--md-default-fg-color--lightest, #e0e0e0);
        color: var(--md-default-fg-color, #333);
    }
</style>
<script type="text/javascript">
    (function() {
        var CONSENT_KEY = "clarity_consent";
        var CLARITY_PROJECT_ID = "5pd40fk720";

        function getStoredConsent() {
            try {
                var value = window.localStorage && window.localStorage.getItem(CONSENT_KEY);
                return value === "granted" || value === "denied" ? value : null;
            } catch (e) {
                return null;
            }
        }

        function setStoredConsent(value) {
            try {
                if (window.localStorage) {
                    window.localStorage.setItem(CONSENT_KEY, value);
                }
            } catch (e) {}
        }

        function deleteCookie(name) {
            document.cookie = name + "=; Max-Age=0; path=/";
            document.cookie = name + "=; Max-Age=0; path=/; domain=" + window.location.hostname;
        }

        function clearClarityCookies() {
            deleteCookie("_clck");
            deleteCookie("_clsk");
        }

        function loadClarity() {
            window.clarity = window.clarity || function() {
                (window.clarity.q = window.clarity.q || []).push(arguments);
            };

            window.clarity("consentv2", {
                ad_Storage: "granted",
                analytics_Storage: "granted"
            });

            if (window.__clarityScriptLoaded) {
                return;
            }
            window.__clarityScriptLoaded = true;

            var script = document.createElement("script");
            script.async = true;
            script.src = "https://www.clarity.ms/tag/" + CLARITY_PROJECT_ID;
            var firstScript = document.getElementsByTagName("script")[0];
            firstScript.parentNode.insertBefore(script, firstScript);
        }

        var storedConsent = getStoredConsent();
        if (storedConsent === "granted") {
            loadClarity();
            return;
        }

        if (storedConsent === "denied") {
            clearClarityCookies();
            return;
        }

        var banner = document.createElement("div");
        banner.id = "cookie-consent-banner";
        banner.setAttribute("role", "dialog");
        banner.setAttribute("aria-label", "Cookie consent");
        banner.innerHTML =
            '<p>This site uses cookies via Microsoft Clarity to understand how you use our documentation. ' +
            '<a href="https://learn.microsoft.com/en-us/clarity/setup-and-installation/clarity-cookies" ' +
            'target="_blank" rel="noopener">Learn more</a></p>' +
            '<div class="consent-buttons">' +
            '<button id="cookie-consent-decline">Decline</button>' +
            '<button id="cookie-consent-accept">Accept</button>' +
            '</div>';

        document.addEventListener("DOMContentLoaded", function() {
            document.body.appendChild(banner);

            document.getElementById("cookie-consent-accept").addEventListener("click", function() {
                setStoredConsent("granted");
                loadClarity();
                banner.remove();
            });

            document.getElementById("cookie-consent-decline").addEventListener("click", function() {
                setStoredConsent("denied");
                clearClarityCookies();
                banner.remove();
            });
        });
    })();
</script>
{% endblock %}

{% block content %}
{% if page.nb_url %}

    <a href="{{ page.nb_url }}" title="Download Notebook" class="md-content__button md-icon">
       {% include ".icons/material/download.svg" %}
    </a><br>
{% endif %}

{{ super() }}
{% endblock content %}
