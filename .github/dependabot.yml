# Security rationale for all ecosystem settings:
#
# cooldown (default-days: 7):
#   Waits 7 days after a package release before Dependabot opens a PR.
#   This provides a window for the community to detect and report malicious
#   or compromised packages before they are automatically proposed for adoption
#   (a common supply-chain attack vector known as "zero-day injection").
#
# versioning-strategy: increase:
#   Raises the lower bound of version constraints in pyproject.toml to the new
#   version without widening the upper bound. This repo does not use lockfiles
#   (supports multiple Python versions), so "increase" is the correct strategy:
#   it prevents silent upper-bound drift while keeping pyproject.toml the source
#   of truth for version ranges.
#
# ignore (semver-major / semver-minor):
#   Blocks Dependabot from proposing major or minor version bumps; only patch
#   releases are proposed. This limits exposure to compromised new major/minor
#   releases. NOTE: Dependabot security updates bypass ignore rules — known CVEs
#   will still generate PRs regardless of these settings.
#
# groups (all-dependencies) per entry — update-types: [patch]:
#   Restricts in-group batching to patch releases only, consistent with the
#   ignore rules above. Within each individual updates entry, the groups block
#   batches all matching packages into one set.
#
# multi-ecosystem-groups (all-dependencies):
#   Top-level grouping that spans every updates entry (pip, docker,
#   docker-compose, github-actions). Each entry opts in via
#   "multi-ecosystem-group: all-dependencies". Dependabot will then combine
#   all matching updates across all ecosystems and directories into a single
#   pull request, reducing review noise.
#   Reference: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file#multi-ecosystem-groups
#   NOTE: multi-ecosystem-groups only supports schedule, assignees, and labels.
#   cooldown and ignore cannot be hoisted here and must be repeated per entry.
#
# open-pull-requests-limit: 1:
#   Caps the number of open version-update PRs to 1, preventing
#   "security fatigue" from many simultaneous update PRs. Must be set on
#   the multi-ecosystem-groups block, not on individual updates entries.
#
# Note: Dependabot's config parser does not support YAML anchors/merge keys,
# so the shared settings below are repeated explicitly for each entry.

version: 2

multi-ecosystem-groups:
  all-dependencies:
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 1

updates:
  - package-ecosystem: "pip"
    directory: "/presidio-analyzer"
    schedule:
      interval: "weekly"
    multi-ecosystem-group: "all-dependencies"
    patterns:
      - "*"
    labels:
      - "dependencies"
      - "python"
    versioning-strategy: increase
    cooldown:
      default-days: 7
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
    groups:
      all-dependencies:
        patterns:
          - "*"
        update-types:
          - "patch"

  - package-ecosystem: "pip"
    directory: "/presidio-anonymizer"
    schedule:
      interval: "weekly"
    multi-ecosystem-group: "all-dependencies"
    patterns:
