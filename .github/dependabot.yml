  - package-ecosystem: "pip"
    directory: "/presidio-structured"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "python"
    versioning-strategy: increase
    cooldown:
      default-days: 7
    groups:
      python-dependencies:
        patterns:
