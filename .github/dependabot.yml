        update-types: ["version-update:semver-major", "version-update:semver-minor"]
    groups:
      all-dependencies:
        patterns:
          - "*"
        update-types:
          - "patch"

  - package-ecosystem: "pip"
    directory: "/presidio"
    schedule:
      interval: "weekly"
    multi-ecosystem-group: "all-dependencies"
    patterns:
      - "*"
    labels:
      - "dependencies"
      - "python"
    versioning-strategy: increase
    cooldown:
