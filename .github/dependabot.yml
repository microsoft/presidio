  # Monitor Docker dependencies
  - package-ecosystem: "docker"
    directory: "/presidio-analyzer"
    schedule:
      interval: "monthly"
    multi-ecosystem-group: "all-dependencies"
    patterns:
      - "*"
    labels:
      - "dependencies"
      - "docker"
    cooldown:
      default-days: 7
    ignore:
      # Block major and minor version bumps for all images; allow only patch updates
      - dependency-name: "*"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
    groups:
      all-dependencies:
        patterns: ["*"]
        update-types:
          - "patch"

