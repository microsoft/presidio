# Security rationale for pip ecosystem settings:
#
# cooldown (default-days: 7):
#   Waits 7 days after a package release before Dependabot opens a PR.
#   This provides a window for the community to detect and report malicious
#   or compromised packages before they are automatically proposed for adoption
#   (a common supply-chain attack vector known as "zero-day injection").
#
# versioning-strategy: increase:
#   Raises the lower bound of version constraints in pyproject.toml to the new
#   version without widening the upper bound. This repo does not use lockfiles
#   (supports multiple Python versions), so "increase" is the correct strategy:
#   it prevents silent upper-bound drift while keeping pyproject.toml the source
#   of truth for version ranges.
#
# ignore (semver-major / semver-minor):
#   Blocks Dependabot from proposing major or minor version bumps; only patch
#   releases are proposed. This limits exposure to compromised new major/minor
#   releases. NOTE: Dependabot security updates bypass ignore rules — known CVEs
#   will still generate PRs regardless of these settings.
#
# groups + open-pull-requests-limit: 3:
#   Batches all minor/patch updates into a single PR and caps open PRs at 3
#   to prevent "security fatigue" from too many simultaneous update PRs.
#
# DRY: The shared pip settings are defined once on the first entry via the YAML
# anchor &pip-defaults. Subsequent pip entries merge those defaults with
# <<: *pip-defaults and only override the `directory` field.

version: 2
updates:
  # --- pip entries (all share the same security settings via YAML anchor) ---
  - &pip-defaults
    package-ecosystem: "pip"
    directory: "/presidio-analyzer"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "python"
    versioning-strategy: increase
    cooldown:
      default-days: 7
    groups:
      python-dependencies:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]

  - <<: *pip-defaults
    directory: "/presidio-anonymizer"

  - <<: *pip-defaults
    directory: "/presidio-image-redactor"

  - <<: *pip-defaults
    directory: "/presidio-cli"

  - <<: *pip-defaults
    directory: "/presidio-structured"

  # Monitor Docker dependencies
  - package-ecosystem: "docker"
    directory: "/presidio-analyzer"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "docker"
    ignore:
      # Allow only patch/micro and digest updates for python; block major and minor version bumps
      - dependency-name: "python"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      
  - package-ecosystem: "docker"
    directory: "/presidio-anonymizer"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "docker"
    ignore:
      # Allow only patch/micro and digest updates for python; block major and minor version bumps
      - dependency-name: "python"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      
  - package-ecosystem: "docker"
    directory: "/presidio-image-redactor"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "docker"
    ignore:
      # Allow only patch/micro and digest updates for python; block major and minor version bumps
      - dependency-name: "python"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      
  - package-ecosystem: "docker-compose"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "docker-compose"
      
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "github-actions"
