version: 2

# Supply-chain security notes for pip entries:
# - cooldown: default-days: 7 — delays PRs by 7 days after a release, giving the community time
#   to detect and yank malicious packages before they are adopted.
# - versioning-strategy: increase — raises the minimum pinned version in pyproject.toml without
#   requiring a lockfile, making it suitable for libraries that support multiple Python versions.
# - ignore rules — ensure only patch-level updates are auto-proposed; major and minor bumps
#   (which carry higher supply-chain risk) are blocked from automatic PRs.

updates:
  - package-ecosystem: "pip"
    directory: "/presidio-analyzer"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "python"
    versioning-strategy: increase
    cooldown:
      default-days: 7
    groups:
      python-dependencies:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]

  - package-ecosystem: "pip"
    directory: "/presidio-anonymizer"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "python"
    versioning-strategy: increase
    cooldown:
      default-days: 7
    groups:
      python-dependencies:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]

  - package-ecosystem: "pip"
    directory: "/presidio-image-redactor"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "python"
    versioning-strategy: increase
    cooldown:
      default-days: 7
    groups:
      python-dependencies:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]

  - package-ecosystem: "pip"
    directory: "/presidio-cli"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "python"
    versioning-strategy: increase
    cooldown:
      default-days: 7
    groups:
      python-dependencies:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]

  - package-ecosystem: "pip"
    directory: "/presidio-structured"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "python"
    versioning-strategy: increase
    cooldown:
      default-days: 7
    groups:
      python-dependencies:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]

  # Monitor Docker dependencies
  - package-ecosystem: "docker"
    directory: "/presidio-analyzer"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "docker"
    ignore:
      # Allow only patch/micro and digest updates for python; block major and minor version bumps
      - dependency-name: "python"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      
  - package-ecosystem: "docker"
    directory: "/presidio-anonymizer"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "docker"
    ignore:
      # Allow only patch/micro and digest updates for python; block major and minor version bumps
      - dependency-name: "python"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      
  - package-ecosystem: "docker"
    directory: "/presidio-image-redactor"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "docker"
    ignore:
      # Allow only patch/micro and digest updates for python; block major and minor version bumps
      - dependency-name: "python"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      
  - package-ecosystem: "docker-compose"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "docker-compose"
      
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "github-actions"
