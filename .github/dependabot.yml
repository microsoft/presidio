version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/presidio-analyzer"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "python"
    
  - package-ecosystem: "pip"
    directory: "/presidio-anonymizer"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "python"
    
  - package-ecosystem: "pip"
    directory: "/presidio-image-redactor"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "python"
      
  - package-ecosystem: "pip"
    directory: "/presidio-cli"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "python"
      
  - package-ecosystem: "pip"
    directory: "/presidio-structured"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "python"

  # Monitor Docker dependencies
  - package-ecosystem: "docker"
    directory: "/presidio-analyzer"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "docker"
    ignore:
      # Allow only patch/micro and digest updates for python; block major and minor version bumps
      - dependency-name: "python"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      
  - package-ecosystem: "docker"
    directory: "/presidio-anonymizer"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "docker"
    ignore:
      # Allow only patch/micro and digest updates for python; block major and minor version bumps
      - dependency-name: "python"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      
  - package-ecosystem: "docker"
    directory: "/presidio-image-redactor"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "docker"
    ignore:
      # Allow only patch/micro and digest updates for python; block major and minor version bumps
      - dependency-name: "python"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      
  - package-ecosystem: "docker-compose"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "docker-compose"
      
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "github-actions"
