name: Release

on:
  workflow_dispatch:

permissions: read-all

env:
  IMAGE_REGISTRY: ghcr.io
  IMAGE_NAMESPACE: data-privacy-stack

jobs:
  get-version:
    name: Get Version Numbers
    runs-on: ubuntu-slim
    outputs:
      version: ${{ steps.set-version.outputs.version }}
      image-version: ${{ steps.set-image-version.outputs.image-version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0
        with:
          persist-credentials: false

      - name: Extract main version
        id: set-version
        run: |
          set -eu
          ver=$(grep -m 1 version presidio-analyzer/pyproject.toml | tr -s ' ' | tr -d '"' | tr -d "'" | cut -d' ' -f3)
          echo "version=$ver" >> $GITHUB_OUTPUT
          echo "Main version: $ver"

      - name: Extract image-redactor version
        id: set-image-version
        run: |
          set -eu
          imageVer=$(grep -m 1 version presidio-image-redactor/pyproject.toml | tr -s ' ' | tr -d '"' | tr -d "'" | cut -d' ' -f3)
          echo "image-version=$imageVer" >> $GITHUB_OUTPUT
          echo "Image-redactor version: $imageVer"

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-slim
    needs: get-version
    permissions:
      contents: write
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0
        with:
          persist-credentials: false

      - name: Create GitHub Release       
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ needs.get-version.outputs.version }}" \
            --title "Release ${{ needs.get-version.outputs.version }}" \
            --notes "" \
            --draft \
            --latest

  publish-to-pypi:
    name: Publish ${{ matrix.package.name }} to PyPI
    runs-on: ubuntu-latest 
    needs: get-version
    permissions:
      id-token: write  # Required for trusted publishing to PyPI
    strategy:
      fail-fast: false
      matrix:
        package:
          - name: "Presidio"
            path: "presidio"
          - name: "Analyzer"
            path: "presidio-analyzer"
          - name: "Anonymizer"
            path: "presidio-anonymizer"
          - name: "Image-Redactor"
            path: "presidio-image-redactor"
          - name: "Structured"
            path: "presidio-structured"
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.10'

      - name: Install build dependencies
        run: |
          pip install build==1.2.2.post1

      - name: Build wheel and sdist packages
        working-directory: ${{ matrix.package.path }}
        run: |
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1.14.0
        with:
          packages-dir: ${{ matrix.package.path }}/dist/
          skip-existing: true

  build-and-push-containers:
    name: Build and Push Containers
    runs-on: ubuntu-latest
    needs: get-version
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        image: [presidio-anonymizer, presidio-analyzer, presidio-image-redactor]

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0
        with:
          persist-credentials: false

      - name: Log in to GitHub Container Registry
        env:
          GHCR_TOKEN: ${{ github.repository_owner == 'data-privacy-stack' && github.token || secrets.GHCR_TOKEN }}
          GHCR_USERNAME: ${{ github.repository_owner == 'data-privacy-stack' && github.actor || vars.GHCR_USERNAME || github.actor }}
        run: echo "${GHCR_TOKEN}" | docker login ${{ env.IMAGE_REGISTRY }} -u "${GHCR_USERNAME}" --password-stdin

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build and Push ${{ matrix.image }}
        run: |
          repo="${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}"
          version_tag="${{ matrix.image == 'presidio-image-redactor' && needs.get-version.outputs.image-version || needs.get-version.outputs.version }}"
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --cache-from type=registry,ref=${repo}:latest \
            --cache-to type=inline \
            --tag ${repo}:latest \
            --tag ${repo}:${version_tag} \
            --attest type=sbom \
            --attest type=provenance,mode=max \
            --push \
            ./${{ matrix.image }}
        env:
          IMAGE_REGISTRY: ${{ env.IMAGE_REGISTRY }}
          IMAGE_NAMESPACE: ${{ env.IMAGE_NAMESPACE }}
