{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "presidio.fullname" . }}
  labels:
    {{- include "presidio.labels" (dict "root" $ "name" "shared") | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- with .Values.ingress.tls }}
  tls:
    {{- range . }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- /* Map each ingress service alias (also the resource name) to its values block. */}}
    {{- $components := dict "analyzer" $.Values.analyzer "anonymizer" $.Values.anonymizer "image-redactor" $.Values.imageRedactor }}
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          {{- $svc := .service }}
          {{- if not (hasKey $components $svc) }}
          {{- fail (printf "ingress path references unknown service %q (expected \"analyzer\", \"anonymizer\" or \"image-redactor\")" $svc) }}
          {{- end }}
          {{- $component := index $components $svc }}
          {{- if $component.enabled }}
          - path: {{ .path }}
            {{- with .pathType }}
            pathType: {{ . }}
            {{- end }}
            backend:
              service:
                name: {{ include "presidio.componentFullname" (dict "root" $ "name" $svc) }}
                port:
                  number: {{ $component.service.port }}
          {{- end }}
          {{- end }}
    {{- end }}
{{- end }}
