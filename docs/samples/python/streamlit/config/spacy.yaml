# Presidio demo — spaCy NER configuration.
# NER is provided by spaCy's en_core_web_lg model via the SpacyRecognizer,
# complemented by the rule-based predefined recognizers below.
supported_languages:
  - en
default_score_threshold: 0

nlp_configuration:
  nlp_engine_name: spacy
  models:
    - lang_code: en
      model_name: en_core_web_lg
  ner_model_configuration:
    model_to_presidio_entity_mapping:
      PER: PERSON
      PERSON: PERSON
      NORP: NRP
      FAC: FACILITY
      LOC: LOCATION
      GPE: LOCATION
      LOCATION: LOCATION
      ORG: ORGANIZATION
      ORGANIZATION: ORGANIZATION
      DATE: DATE_TIME
      TIME: DATE_TIME
    low_confidence_score_multiplier: 0.4
    low_score_entity_names:
      - ORG
      - ORGANIZATION

recognizer_registry:
  global_regex_flags: 26
  recognizers:
    - name: SpacyRecognizer
      type: predefined
      enabled: true
    - name: CreditCardRecognizer
      type: predefined
    - name: CryptoRecognizer
      type: predefined
    - name: DateRecognizer
      type: predefined
    - name: EmailRecognizer
      type: predefined
    - name: IbanRecognizer
      type: predefined
    - name: IpRecognizer
      type: predefined
    - name: PhoneRecognizer
      type: predefined
    - name: UrlRecognizer
      type: predefined
    - name: UsSsnRecognizer
      type: predefined
    - name: UsBankRecognizer
      type: predefined
    - name: UsPassportRecognizer
      type: predefined
    - name: UsLicenseRecognizer
      type: predefined
    - name: MedicalLicenseRecognizer
      type: predefined
    - name: MacAddressRecognizer
      type: predefined
    - name: NhsRecognizer
      type: predefined
    - name: UsItinRecognizer
      type: predefined
